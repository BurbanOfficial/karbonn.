<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Espace commercial — CARBON.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <style>
    :root {
      --bg: #ffffff;
      --panel: #fafafa;
      --text: #111111;
      --muted: #6b6b6b;
      --accent: #111111;
      --border: #e8e8e8;
      --error: #d32f2f;
      --success: #2e7d32;
      --sidebar-width: 72px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      height: 100vh;
      display: flex;
    }

    #app-content {
      display: flex;
      width: 100%;
      min-height: 100vh;
    }

    .sidebar {
      position: fixed;
      top: 72px;
      left: 0;
      width: var(--sidebar-width);
      height: calc(100vh - 72px);
      background-color: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 100;
    }

    .nav-menu {
      flex: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 0;
      gap: 8px;
    }

    .nav-item {
      position: relative;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      text-decoration: none;
      border-radius: 10px;
      transition: color 0.2s ease, background-color 0.2s ease;
    }

    .nav-item:hover,
    .nav-item.active {
      color: var(--accent);
      background-color: rgba(0, 0, 0, 0.05);
    }

    .nav-item i {
      font-size: 1.15rem;
    }

    .nav-item::after {
      content: attr(data-label);
      position: absolute;
      left: 64px;
      top: 50%;
      transform: translateY(-50%);
      background-color: var(--text);
      color: var(--bg);
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 0.75rem;
      font-weight: 500;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
    }

    .nav-item:hover::after {
      opacity: 1;
      transform: translateY(-50%) translateX(6px);
    }

    .main {
      margin-left: var(--sidebar-width);
      width: calc(100% - var(--sidebar-width));
      height: 100vh;
      padding-top: 72px;
      display: flex;
      flex-direction: column;
    }

    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      background-color: var(--bg);
      border-bottom: 1px solid var(--border);
      z-index: 110;
    }

    .top-bar .brand {
      color: var(--text);
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .user-profile {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background-color: var(--text);
      color: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .user-info {
      display: flex;
      flex-direction: column;
      line-height: 1.3;
    }

    .user-name {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
    }

    .user-role {
      font-size: 0.75rem;
      color: var(--muted);
    }

    #logout-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.9rem;
      padding: 8px;
      margin-left: 8px;
      transition: color 0.2s ease;
    }

    #logout-btn:hover {
      color: var(--text);
    }

    .content {
      flex: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 32px 48px;
      overflow-y: auto;
    }

    .sub-nav {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
    }

    .sub-nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 8px 12px;
      border-radius: 8px;
      transition: color 0.2s ease, background-color 0.2s ease;
    }

    .sub-nav a:hover,
    .sub-nav a.active {
      color: var(--text);
      background-color: rgba(0, 0, 0, 0.05);
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .page-header h1 {
      font-size: 1.4rem;
      font-weight: 600;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background-color: var(--text);
      color: var(--bg);
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }

    .btn:hover {
      opacity: 0.85;
    }

    .modal {
      position: fixed;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 300;
      padding: 24px;
      opacity: 1;
      visibility: visible;
      transition: opacity 0.2s ease, visibility 0.2s ease;
    }

    .modal.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .modal-card {
      width: 100%;
      max-width: 520px;
      background-color: var(--bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.12);
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .modal-header h2 {
      font-size: 1.2rem;
      font-weight: 600;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.2rem;
      cursor: pointer;
    }

    .step-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .type-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    .type-option {
      padding: 24px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background-color: var(--panel);
      cursor: pointer;
      text-align: center;
      transition: border-color 0.2s ease, background-color 0.2s ease;
    }

    .type-option:hover {
      border-color: var(--text);
      background-color: var(--bg);
    }

    .type-option i {
      font-size: 1.5rem;
      margin-bottom: 10px;
      color: var(--text);
    }

    .type-option span {
      display: block;
      font-size: 0.95rem;
      font-weight: 600;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background-color: var(--panel);
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s ease;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--text);
    }

    .form-group textarea {
      min-height: 80px;
      resize: vertical;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .modal-actions {
      display: flex;
      justify-content: space-between;
      margin-top: 24px;
    }

    .btn-secondary {
      background-color: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .error {
      color: var(--error);
      font-size: 0.85rem;
      margin-top: 12px;
      min-height: 1.2em;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 768px) {
      :root {
        --sidebar-width: 64px;
      }

      .nav-item::after {
        display: none;
      }

      .content {
        padding: 24px;
      }

      .type-options {
        grid-template-columns: 1fr;
      }

      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="modal hidden" id="client-modal">
    <div class="modal-card">
      <div class="modal-header">
        <h2>Nouveau client</h2>
        <button class="modal-close" id="close-modal"><i class="fa-solid fa-xmark"></i></button>
      </div>

      <div id="step-1">
        <p class="step-title">Étape 1 / 2</p>
        <div class="type-options">
          <div class="type-option" id="btn-particulier">
            <i class="fa-solid fa-user"></i>
            <span>Particulier</span>
          </div>
          <div class="type-option" id="btn-professionnel">
            <i class="fa-solid fa-building"></i>
            <span>Professionnel</span>
          </div>
        </div>
      </div>

      <div id="step-2" class="hidden">
        <p class="step-title">Étape 2 / 2</p>
        <input type="hidden" id="client-type" />

        <form id="form-particulier" class="hidden">
          <div class="form-row">
            <div class="form-group">
              <label for="part-nom">Nom du contact</label>
              <input type="text" id="part-nom" name="nom" required />
            </div>
            <div class="form-group">
              <label for="part-prenom">Prénom</label>
              <input type="text" id="part-prenom" name="prenom" required />
            </div>
          </div>
          <div class="form-group">
            <label for="part-email">Email</label>
            <input type="email" id="part-email" name="email" required />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="part-telephone">Téléphone</label>
              <input type="tel" id="part-telephone" name="telephone" />
            </div>
            <div class="form-group">
              <label for="part-site">Site web</label>
              <input type="url" id="part-site" name="siteWeb" />
            </div>
          </div>
          <div class="form-group">
            <label for="part-adresse">Adresse</label>
            <textarea id="part-adresse" name="adresse"></textarea>
          </div>
          <div class="modal-actions">
            <button type="submit" class="btn">Créer le client</button>
          </div>
        </form>

        <form id="form-professionnel" class="hidden">
          <div class="form-group">
            <label for="pro-entreprise">Nom de l'entreprise</label>
            <input type="text" id="pro-entreprise" name="entreprise" required />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="pro-nom">Nom du contact</label>
              <input type="text" id="pro-nom" name="nom" required />
            </div>
            <div class="form-group">
              <label for="pro-prenom">Prénom</label>
              <input type="text" id="pro-prenom" name="prenom" required />
            </div>
          </div>
          <div class="form-group">
            <label for="pro-email">Email</label>
            <input type="email" id="pro-email" name="email" required />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="pro-telephone">Téléphone</label>
              <input type="tel" id="pro-telephone" name="telephone" />
            </div>
            <div class="form-group">
              <label for="pro-site">Site web</label>
              <input type="url" id="pro-site" name="siteWeb" />
            </div>
          </div>
          <div class="form-group">
            <label for="pro-adresse">Adresse</label>
            <textarea id="pro-adresse" name="adresse"></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="pro-secteur">Secteur d'activité</label>
              <input type="text" id="pro-secteur" name="secteur" />
            </div>
            <div class="form-group">
              <label for="pro-taille">Taille de l'entreprise</label>
              <select id="pro-taille" name="taille">
                <option value="">Sélectionner</option>
                <option value="1-10">1 - 10 employés</option>
                <option value="11-50">11 - 50 employés</option>
                <option value="51-200">51 - 200 employés</option>
                <option value="201-500">201 - 500 employés</option>
                <option value="500+">500+ employés</option>
              </select>
            </div>
          </div>
          <div class="modal-actions">
            <button type="submit" class="btn">Créer le client</button>
          </div>
        </form>

        <div class="modal-actions" style="margin-top: 0;">
          <button type="button" class="btn btn-secondary" id="back-step-1">Retour</button>
          <span></span>
        </div>
      </div>

      <p class="error" id="modal-error"></p>
    </div>
  </div>

  <div id="app-content">
    <aside class="sidebar">
      <nav class="nav-menu">
        <a href="intranet.html" class="nav-item" data-label="Dashboard">
          <i class="fa-solid fa-house"></i>
        </a>
        <a href="espace-commercial.html" class="nav-item active" data-label="Espace commercial">
          <i class="fa-solid fa-store"></i>
        </a>
        <a href="#" class="nav-item" data-label="Gestion de projets">
          <i class="fa-solid fa-diagram-project"></i>
        </a>
        <a href="#" class="nav-item" data-label="Gestion documentaire">
          <i class="fa-solid fa-cloud"></i>
        </a>
      </nav>
    </aside>

    <main class="main">
      <div class="top-bar">
        <a href="index.html" class="brand">CARBON.</a>
        <div class="user-profile">
          <div class="user-avatar" id="user-avatar"></div>
          <div class="user-info">
            <span class="user-name" id="user-name"></span>
            <span class="user-role" id="user-role"></span>
          </div>
          <button id="logout-btn" title="Se déconnecter"><i class="fa-solid fa-arrow-right-from-bracket"></i></button>
        </div>
      </div>

      <div class="content">
        <nav class="sub-nav">
          <a href="#" class="active">Fiche Client</a>
        </nav>

        <div class="page-header">
          <h1>Fiches clients</h1>
          <button class="btn" id="create-client-btn">
            <i class="fa-solid fa-plus"></i>
            Créer un client
          </button>
        </div>

        <p style="color: var(--muted); font-size: 0.9rem;">Aucun client pour le moment. Cliquez sur "Créer un client" pour ajouter votre première fiche.</p>
      </div>
    </main>
  </div>

  <script src="espace-commercial.js"></script>
</body>
</html>
