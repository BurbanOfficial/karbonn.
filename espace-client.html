<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Espace Client — KARBONN.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <style>
    :root {
      --bg: #ffffff;
      --panel: #fafafa;
      --text: #111111;
      --muted: #6b6b6b;
      --accent: #111111;
      --border: #e8e8e8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }

    .login-overlay {
      position: fixed;
      inset: 0;
      background-color: var(--bg);
      display: flex;
      z-index: 200;
    }

    .login-overlay.hidden {
      display: none;
    }

    .login-left {
      flex: 1;
      background-color: var(--text);
      color: var(--bg);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 64px;
      clip-path: polygon(0 0, 80% 0, 100% 50%, 80% 100%, 0 100%);
    }

    .login-left .brand {
      color: var(--bg);
      text-decoration: none;
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
    }

    .login-left .welcome {
      font-size: 1.6rem;
      font-weight: 500;
      line-height: 1.3;
      max-width: 320px;
    }

    .login-right {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px;
    }

    .login-card {
      width: 100%;
      max-width: 380px;
      background-color: var(--bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
    }

    .login-card h1 {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 28px;
    }

    .login-card .form-group {
      margin-bottom: 18px;
    }

    .login-card label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .login-card input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background-color: var(--panel);
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .login-card input:focus {
      border-color: var(--text);
    }

    .login-card input::placeholder {
      text-transform: none;
      letter-spacing: normal;
      color: var(--muted);
    }

    .login-card button[type="submit"] {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background-color: var(--text);
      color: var(--bg);
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s ease;
      margin-top: 8px;
    }

    .login-card button[type="submit"]:hover {
      opacity: 0.85;
    }

    .login-card .error {
      color: #d32f2f;
      font-size: 0.85rem;
      margin-top: 14px;
      text-align: center;
      min-height: 1.2em;
    }

    .login-card .hint {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 20px;
    }

    @media (max-width: 768px) {
      .login-left {
        display: none;
      }

      .login-right {
        flex: 1;
        padding: 24px;
      }
    }

    /* App content */
    .app-container {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .app-container.hidden {
      display: none;
    }

    .top-bar {
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      background-color: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    .top-bar .brand {
      color: var(--text);
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .client-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .client-badge {
      background-color: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.04em;
    }

    .client-name {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text);
    }

    #logout-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.9rem;
      padding: 8px;
      margin-left: 8px;
      transition: color 0.2s ease;
    }

    #logout-btn:hover {
      color: var(--text);
    }

    .main-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px;
    }

    .placeholder {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .placeholder i {
      color: var(--border);
      margin-bottom: 12px;
    }

    .placeholder p {
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="login-overlay" id="login-screen">
    <div class="login-left">
      <a href="index.html" class="brand">KARBONN.</a>
      <p class="welcome">Votre espace client.</p>
    </div>
    <div class="login-right">
      <div class="login-card">
        <h1>Accès Espace Client</h1>
        <form id="login-form">
          <div class="form-group">
            <label for="login-id">Identifiant unique</label>
            <input type="text" id="login-id" name="clientId" placeholder="KRB-000-000" required maxlength="11" />
          </div>
          <button type="submit">Accéder à mon espace</button>
          <p class="error" id="login-error"></p>
        </form>
        <p class="hint">Votre identifiant vous a été communiqué lors de la création de votre compte.</p>
      </div>
    </div>
  </div>

  <div class="app-container hidden" id="app-content">
    <div class="top-bar">
      <a href="index.html" class="brand">KARBONN.</a>
      <div class="client-info">
        <span class="client-name" id="client-name"></span>
        <span class="client-badge" id="client-badge"></span>
        <button id="logout-btn" title="Se déconnecter"><i class="fa-solid fa-arrow-right-from-bracket"></i></button>
      </div>
    </div>
    <div class="main-content">
      <div class="placeholder">
        <i class="fa-solid fa-folder-open fa-2x"></i>
        <p>Bienvenue dans votre espace client.</p>
      </div>
    </div>
  </div>

  <script src="espace-client.js"></script>
</body>
</html>
